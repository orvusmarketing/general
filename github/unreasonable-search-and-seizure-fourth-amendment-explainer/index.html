<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Is the 4th Amendment protecting searches and seizures?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index,follow" />
  <style>
    :root{
      --container-max: 980px;
      --container-pad-x: clamp(16px, 4vw, 44px);
      --container-pad-y: clamp(20px, 3vw, 44px);

      /* Brand-derived tokens */
      --text-color: #ffffff;           /* from --mc-ink */
      --accent: #ae2736;               /* from --mc-accent */
      --accent-hover: #8d1f2b;         /* derived darker accent */
      --line: rgba(255,255,255,.16);   /* from --mc-line */
      --surface: #0b2664;              /* from --mc-bg */
      --surface-2: rgba(255,255,255,.04); /* from --mc-panel-2 */
      --radius: 0px;                   /* from --mc-radius */
      --font: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;

      --shadow: 0 10px 28px rgba(0,0,0,.10);
      --shadow-soft: 0 6px 18px rgba(0,0,0,.08);
      --measure: 72ch;
    }

    html, body{
      margin:0;
      padding:0;
      font-family: var(--font);
      color: var(--text-color);
      background: var(--surface);
    }

    .content-wrapper{
      max-width: var(--container-max);
      margin: 0 auto;
      padding: var(--container-pad-y) var(--container-pad-x);
      box-sizing: border-box;
      overflow: hidden;
    }

    .page-shell{
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .top{
      padding: clamp(18px, 2.6vw, 28px);
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
    }

    .banner{
      text-align:center;
      margin: 0 0 clamp(16px, 2.4vw, 22px);
    }
    .banner img{
      width: 100%;
      max-width: 100%;
      height: auto;
      display:block;
      margin:0 auto;
      border-radius: calc(var(--radius) - 2px);
      box-shadow: var(--shadow-soft);
    }

    .title{
      text-align:center;
      margin: 0;
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-size: clamp(1.55rem, 2.8vw, 2.2rem);
      color: var(--text-color);
    }

    .subline{
      margin: .75rem auto 0;
      text-align:center;
      max-width: var(--measure);
      line-height: 1.65;
      color: color-mix(in srgb, var(--text-color) 80%, #fff 20%);
      font-size: 1rem;
    }

    .cta-wrap{
      padding: clamp(18px, 2.6vw, 28px);
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }
    .cta-section{
      max-width: min(560px, 100%);
      margin: 0 auto;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) - 4px);
      padding: 18px 16px;
      background: var(--surface-2);
      box-shadow: var(--shadow-soft);
    }
    .cta-section h2{
      margin: 0 0 .75rem;
      font-size: 1.05rem;
      letter-spacing: .01em;
      color: var(--text-color);
    }
    .cta-button{
      display:inline-block;
      background: var(--accent);
      color: #fff;
      padding: .82em 1.6em;
      font-weight: 800;
      text-decoration: none;
      border-radius: calc(var(--radius) - 6px);
      box-shadow: 0 10px 22px rgba(0,0,0,.14);
      transition: transform .14s ease, box-shadow .18s ease, filter .18s ease;
    }
    .cta-button:hover{
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(0,0,0,.18);
      filter: brightness(.98);
      background: var(--accent-hover);
    }

    .main{
      padding: clamp(18px, 2.6vw, 28px);
      background: var(--surface);
    }

    /* Safety layer */
    .article-body,
    .article-body *{ box-sizing: border-box; }

    .article-body{
      max-width: var(--measure);
      margin: 0 auto;
      overflow-wrap: anywhere;
      word-break: normal;
      line-height: 1.75;
      font-size: 1rem;
      color: var(--text-color);
    }

    .article-body img,
    .article-body picture,
    .article-body svg{
      max-width: 100% !important;
      height: auto !important;
      display: block;
    }

    .article-body iframe,
    .article-body video,
    .article-body embed,
    .article-body object{
      max-width: 100% !important;
      width: 100% !important;
      height: auto !important;
      display: block;
      aspect-ratio: 16/9;
    }

    .article-body table{
      width: 100% !important;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .article-body pre{
      max-width: 100%;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      padding: 1rem;
      background: var(--surface-2);
      border-radius: calc(var(--radius) - 6px);
      border: 1px solid var(--line);
    }

    .article-body blockquote{
      margin: 1.2rem 0;
      padding: 1rem 1.2rem;
      border-left: 4px solid color-mix(in srgb, var(--accent) 70%, #0000);
      background: var(--surface-2);
      border-radius: calc(var(--radius) - 6px);
      border: 1px solid var(--line);
    }

    .article-body h2{
      margin-top: 2rem;
      margin-bottom: .8rem;
      line-height: 1.25;
      letter-spacing: -0.01em;
      font-size: clamp(1.25rem, 2vw, 1.55rem);
      color: var(--text-color);
    }
    .article-body h3{
      margin-top: 1.4rem;
      margin-bottom: .6rem;
      line-height: 1.3;
      font-size: 1.12rem;
      color: var(--text-color);
    }
    .article-body p{ margin: 0 0 1rem; }
    .article-body ul, .article-body ol{ margin: 0 0 1.1rem 1.25rem; }
    .article-body li{ margin: .25rem 0; }

    .article-body a{
      color: var(--accent);
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 2px;
      font-weight: 650;
      word-break: break-word;
    }

    /* Article images sizing intent: about 1/3 width on desktop */
    .article-body img{
      max-width: min(100%, 320px) !important;
      margin: 1rem auto;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius));
    }

    @media (max-width: 768px){
      .page-shell{
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }
      .content-wrapper{
        padding-left: 0;
        padding-right: 0;
      }
      .top, .cta-wrap, .main{
        padding-left: clamp(14px, 4.6vw, 20px);
        padding-right: clamp(14px, 4.6vw, 20px);
      }
      .article-body{
        max-width: 100%;
      }
      .article-body img{
        max-width: 100% !important;
      }
    }

    /* Scoped adjustments for CTA inside article-body if present */
    .article-body .cta-button{ background: var(--accent); }
    .article-body .cta-button:hover{ background: var(--accent-hover); }
  </style>
</head>
<body>
  <div class="content-wrapper">
    <div class="page-shell">

      <header class="top">
        <div class="banner">
          <img src="https://lh3.googleusercontent.com/d/1EmzPetIQ0hECq9Ed1FAw_nVIojPRSF6p" alt="Is the 4th Amendment protecting searches and seizures?" />
        </div>
        <h1 class="title">Is the 4th Amendment protecting searches and seizures?</h1>
        <p class="subline">A look at how the Fourth Amendment applies to searches and seizures.</p>
      </header>

      <section class="cta-wrap">
        <div class="cta-section">
          <h2>To the original article</h2>
          <a href=""
             class="cta-button"
             target="_blank"
             rel="noopener"
             aria-label="Open original article">Read original</a>
        </div>
      </section>

      <main class="main">
        <div class="article-body">
          <h2>Is the 4th Amendment protecting searches and seizures?</h2>

          <figure>
            <img src="https://financepolice.com/wp-content/uploads/2026/01/unreasonable-search-and-seizure.jpg" alt="Is the 4th Amendment protecting searches and seizures?" />
          </figure>

        </div>
      </main>

    </div>
  </div>
</body>
</html>
